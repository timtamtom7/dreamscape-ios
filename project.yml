name: Dreamscape
options:
  bundleIdPrefix: com.dreamscape
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: false

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    from: "0.15.0"

targets:
  Dreamscape:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "**/.DS_Store"
          - "**/Info.plist"
    resources:
      - path: Sources/Resources
        excludes:
          - "**/Info.plist"
    settings:
      base:
        INFOPLIST_FILE: Sources/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.dreamscape.app
        PRODUCT_MODULE_NAME: Dreamscape
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        SWIFT_EMIT_LOC_STRINGS: true
        GENERATE_INFOPLIST_FILE: false
    entitlements:
      path: Sources/Resources/Dreamscape.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.dreamscape.app
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.dreamscape.app
    dependencies:
      - package: SQLite
        product: SQLite
    preBuildScripts: []
    postBuildScripts: []

  DreamscapeWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: DreamscapeWidgets
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dreamscape.app.widgets
        PRODUCT_MODULE_NAME: DreamscapeWidgets
        INFOPLIST_FILE: DreamscapeWidgets/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: ""
    dependencies: []
