name: Dreamscape
options:
  bundleIdPrefix: com.tommaso
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    from: "0.16.0"

targets:
  Dreamscape:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "*.md"
          - "DreamscapeMac/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tommaso.dreamscape
        PRODUCT_NAME: Dreamscape
        INFOPLIST_FILE: Sources/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
    entitlements:
      path: Sources/Resources/Dreamscape.entitlements
    dependencies:
      - package: SQLite
        product: SQLite

schemes:
  Dreamscape:
    build:
      targets:
        Dreamscape: all
    run:
      config: Release
