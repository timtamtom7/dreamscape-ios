name: DreamscapeMac
options:
  bundleIdPrefix: com.tommaso
  deploymentTarget:
    macOS: "15.0"
targets:
  DreamscapeMac:
    type: application
    platform: macOS
    sources:
      - path: DreamscapeMac
        excludes:
          - "*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tommaso.dreamscape.mac
        PRODUCT_NAME: Dreamscape
        INFOPLIST_FILE: DreamscapeMac/Info.plist
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: YES
